name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shell lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get install -y shellcheck
          curl -sSL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: shellcheck
        run: shellcheck sync.sh setup.sh

      - name: shfmt (check formatting)
        run: shfmt --diff --indent 2 sync.sh setup.sh
